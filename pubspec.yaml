name: apli_bhaji
description: A stable, fast, fully offline billing app for personal vegetable business management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  intl: ^0.19.0
  pdf: ^3.10.7
  printing: ^5.11.1
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  google_fonts: ^6.1.1
  shared_preferences: ^2.2.2
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
